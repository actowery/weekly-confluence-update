name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate fixtures (verifies make_fixtures.py still runs)
        run: python3 tests/make_fixtures.py

      - name: Fixtures are unchanged after regeneration
        run: git diff --exit-code tests/fixtures/ || (echo "Committed fixtures drifted from make_fixtures.py output" && exit 1)

      - name: Run smoke test
        run: python3 tests/smoke_test.py
